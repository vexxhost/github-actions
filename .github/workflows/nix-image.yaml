name: nix-image

on:
  workflow_call:
    inputs:
      tags:
        type: string
        required: false
        default: |
          type=sha
          type=edge
          type=edge,suffix=-{{date 'X'}}
      push:
        type: boolean
        required: false
        default: false
    outputs:
      image-name:
        description: Image name
        value: ${{ jobs.build.outputs.image-name }}
      image-ref:
        description: Image reference
        value: ${{ jobs.build.outputs.image-ref }}

jobs:
  amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: vexxhost/github-actions/nix-image@377e35d3a5c570338901d9e0edf48bcf86c7c9ef # main
        id: build
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ inputs.push }}
    outputs:
      image-name: ${{ steps.build.outputs.image-name }}
      image-ref: ${{ steps.build.outputs.image-ref }}

  aarch64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: vexxhost/github-actions/nix-image@377e35d3a5c570338901d9e0edf48bcf86c7c9ef # main
        id: build
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ inputs.push }}
    outputs:
      image-name: ${{ steps.build.outputs.image-name }}
      image-ref: ${{ steps.build.outputs.image-ref }}

  manifest:
    runs-on: ubuntu-latest
    if: ${{ inputs.push }}
    needs:
      - amd64
      - aarch64
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        with:
          images: ${{ needs.amd64.outputs.image-name }}
          tags: ${{ inputs.tags }}
      - uses: step-security/docker-login-action@c3e677aae8393bc9c81cfdf9709648720ea4bd4d # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: int128/docker-manifest-create-action@44422a4b046d55dc036df622039ed3aec43c613c # v2.17.0
        with:
          index-annotations: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          sources: |
            ${{ needs.amd64.outputs.image-ref }}
            ${{ needs.aarch64.outputs.image-ref }}
